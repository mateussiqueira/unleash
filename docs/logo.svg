<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="24"/>

  <!-- Terminal bar -->
  <rect x="60" y="60" width="280" height="40" fill="#313244" rx="8"/>
  <circle cx="78" cy="80" r="6" fill="#f38ba8"/>
  <circle cx="96" cy="80" r="6" fill="#fab387"/>
  <circle cx="114" cy="80" r="6" fill="#a6e3a1"/>
  <text x="200" y="86" fill="#6c7086" text-anchor="middle" font-family="SFMono-Regular,Consolas,monospace" font-size="13">unleash</text>

  <!-- Terminal lines -->
  <text x="76" y="136" fill="#89b4fa" font-family="SFMono-Regular,Consolas,monospace" font-size="14">$ ./unleash bypass</text>

  <!-- Progress bar animation -->
  <rect x="76" y="156" width="248" height="8" fill="#313244" rx="4"/>
  <rect x="76" y="156" width="180" height="8" fill="url(#accent)" rx="4"/>

  <text x="76" y="190" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="13">✓ MDM domains blocked</text>
  <text x="76" y="214" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="13">✓ DEP markers removed</text>
  <text x="76" y="238" fill="#a6e3a1" font-family="SFMono-Regular,Consolas,monospace" font-size="13">✓ Profiles cleaned</text>

  <!-- Shield with check -->
  <rect x="143" y="264" width="114" height="72" fill="#313244" rx="12"/>
  <path d="M175 290 L200 266 L225 290 L200 314 Z" fill="none" stroke="#a6e3a1" stroke-width="3"/>
  <path d="M188 300 L196 308 L212 290" fill="none" stroke="#a6e3a1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="200" y="354" fill="#a6e3a1" text-anchor="middle" font-family="SFMono-Regular,Consolas,monospace" font-size="11" font-weight="bold">MDM BYPASSED</text>

  <!-- Cursor blink -->
  <rect x="256" y="124" width="10" height="18" fill="#cdd6f4" rx="2">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
