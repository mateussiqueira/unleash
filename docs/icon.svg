  <path d="M282 372 L312 332" fill="none" stroke="#1e1e2e" stroke-width="24" stroke-linecap="round"/>

  <!-- Checkmark -->
  <path d="M220 280 L248 310 L296 248"
        fill="none" stroke="#a6e3a1" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text -->
  <text x="256" y="492" fill="#6c7086" font-family="SFMono-Regular,Consolas,monospace" font-size="28" text-anchor="middle" font-weight="bold" letter-spacing="4">UNLEASH</text>
</svg>
