name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run ShellCheck
        run: |
          for f in unleash lib/*.sh examples/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking: $f"
            shellcheck -S warning "$f" || exit 1
          done

  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check syntax
        run: |
          for f in unleash lib/*.sh examples/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking: $f"
            bash -n "$f" || exit 1
          done
          echo "All files pass syntax check"

  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install markdownlint
        run: sudo npm install -g markdownlint-cli
      - name: Lint markdown
        run: markdownlint '*.md' --config /dev/null || true
